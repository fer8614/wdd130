<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rafting Rapids</title>
    <meta name="description"
      content="Contact Rafting Rapids to plan your next whitewater rafting adventure and get help from our team.">
    <meta name="author" content="Yesid Fernando Cepeda">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-raftingcompas.jpg" alt="Rafting Rapids logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main id="contact-page">
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-layout">
            <div class="contact-map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d22573.857463819582!2d-123.0130228!3d44.9897514!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sus!4v1780765988273!5m2!1ses-419!2sus"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  title="Map showing Rafting Rapids location"></iframe>
            </div>
            <form class="contact-form">
                <div class="form-field">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Placeholder" required>
                </div>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Placeholder" required>
                </div>

                <fieldset class="form-field">
                    <legend>Message Purpose</legend>

                    <label for="purpose-general">
                        <input id="purpose-general" type="radio" name="purpose" value="general"
                          checked>
                        General Inquiry
                    </label>

                    <label for="purpose-reservation">
                        <input id="purpose-reservation" type="radio" name="purpose"
                          value="reservation">
                        Reservation Question
                    </label>

                    <label for="purpose-suggestion">
                        <input id="purpose-suggestion" type="radio" name="purpose"
                          value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"
                      placeholder="Type here"></textarea>
                </div>

                <label class="newsletter" for="newsletter">
                    <input id="newsletter" type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button class="submit-button" type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="contact-employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-gallery">
                <figure>
                    <img src="images/employee_profile1.jpg" alt="Carlos">
                    <figcaption>Carlos — Operations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_profile2.jpg" alt="Richard">
                    <figcaption>Richard — River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee_profile3.jpg" alt="Melanie">
                    <figcaption>Melanie — Customer Support</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>©2026 🚣‍♀️ Rafting Rapids 🌊 Yesid Fernando Cepeda</p>
        <nav class="socialmedia" aria-label="Social media links">
            <a href="https://facebook.com"><img src="images/icons8-facebook-96.png"
                  alt="Facebook"></a>
            <a href="https://linkedin.com"><img src="images/icons8-linkedin-96.png"
                  alt="LinkedIn"></a>
            <a href="https://instagram.com"><img src="images/icons8-instagram-94.png"
                  alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
